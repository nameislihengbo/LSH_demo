name: Zenodo Sandbox Release Test

on:
  push:
    tags:
      - 'v*-paper*-sandbox'
  workflow_dispatch:
    inputs:
      paper_number:
        description: 'Paper number (1-10)'
        required: true
        default: '1'
      version:
        description: 'Version (e.g., 1.0)'
        required: true
        default: '1.0'

env:
  ZENODO_SANDBOX_URL: https://sandbox.zenodo.org

jobs:
  release-paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Prepare paper metadata
        id: prepare
        run: |
          python scripts/prepare_zenodo_release.py \
            --paper ${{ github.event.inputs.paper_number || '1' }} \
            --sandbox

      - name: Create Zenodo Sandbox deposition
        id: zenodo
        env:
          ZENODO_SANDBOX_TOKEN: ${{ secrets.ZENODO_SANDBOX_TOKEN }}
        run: |
          python scripts/create_zenodo_deposition.py \
            --sandbox \
            --metadata .zenodo.json \
            --paper-dir ${{ steps.prepare.outputs.paper_dir }}

      - name: Summary
        run: |
          echo "### Zenodo Sandbox Release Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Paper | ${{ steps.prepare.outputs.paper_title }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deposition ID | ${{ steps.zenodo.outputs.deposition_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DOI | ${{ steps.zenodo.outputs.doi }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sandbox URL | ${{ steps.zenodo.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
