name: Create Paper Repositories

on:
  workflow_dispatch:
    inputs:
      start_paper:
        description: 'Start paper number (1-10)'
        required: true
        default: '1'
      end_paper:
        description: 'End paper number (1-10)'
        required: true
        default: '10'
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: 'true'
        type: boolean

env:
  GITHUB_USER: nameislihengbo

permissions:
  contents: write
  repositories: write

jobs:
  create-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "${{ secrets.GH_TOKEN }}" | gh auth login --with-token

      - name: Create repositories
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python scripts/create_repos.py \
            --start ${{ github.event.inputs.start_paper }} \
            --end ${{ github.event.inputs.end_paper }} \
            --github-user ${{ env.GITHUB_USER }} \
            ${{ github.event.inputs.create_release == 'true' && '--create-release' || '' }}

      - name: Summary
        run: |
          echo "### Repository Creation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Created repositories for papers ${{ github.event.inputs.start_paper }} to ${{ github.event.inputs.end_paper }}" >> $GITHUB_STEP_SUMMARY
